# Example schema for simple movie review app

type User @table {
  id: UUID! @default(expr: "uuidV4()")
  firstName: String! @col(dataType: "varchar(50)")
  lastName: String! @col(dataType: "varchar(50)")
  email: String! @col(dataType: "varchar(255)")
  authUid: String! @unique @default(expr: "auth.uid")
  role: String @col(dataType: "varchar(50)")
  status: String @col(dataType: "varchar(50)")
  avatarUrl: String @col(name: "avatar_url")
  headline: String @col(dataType: "varchar(255)")
  bio: String @col(dataType: "text")
  website: String @col(dataType: "varchar(255)")
  twitterUrl: String @col(dataType: "varchar(255)")
  instagramUrl: String @col(dataType: "varchar(255)")
  linkedinUrl: String @col(dataType: "varchar(255)")
  photoUrl: String @col(dataType: "varchar(500)")
  notifyEnrollments: Boolean! @default(value: true)
  notifyQuestions: Boolean! @default(value: true)
  notifyMarketing: Boolean! @default(value: false)
  createdAt: Timestamp @default(expr: "request.time") @col(name: "created_at")
}

# Movie is keyed by a randomly generated UUID.
type Movie @table {
  # If you do not pass a 'key' to `@table`, Data Connect automatically adds the following 'id' column.
  # Feel free to uncomment and customize it.
  #  id: UUID! @default(expr: "uuidV4()")
  title: String!
  imageUrl: String!
  genre: String
}

# MovieMetadata is a metadata attached to a Movie.
# Movie <-> MovieMetadata is a one-to-one relationship
type MovieMetadata @table {
  # @unique ensures each Movie can only one MovieMetadata.
  movie: Movie! @unique
  # The movie field adds the following foreign key field. Feel free to uncomment and customize it.
  #  movieId: UUID!
  rating: Float
  releaseYear: Int
  description: String
}

# Reviews is a join table between User and Movie.
# It has a composite primary keys `userUid` and `movieId`.
# A user can leave reviews for many movies. A movie can have reviews from many users.
# User  <-> Review is a one-to-many relationship
# Movie <-> Review is a one-to-many relationship
# Movie <-> User is a many-to-many relationship
type Review @table(name: "Reviews", key: ["movie", "user"]) {
  user: User!
  # The user field adds the following foreign key field. Feel free to uncomment and customize it.
  #  userUid: String!
  movie: Movie!
  # The movie field adds the following foreign key field. Feel free to uncomment and customize it.
  #  movieId: UUID!
  rating: Int
  reviewText: String
  reviewDate: Date! @default(expr: "request.time")
}

type Category @table {
  name: String!
  slug: String!
  imageUrl: String
  parentId: UUID
  createdAt: Timestamp! @default(expr: "request.time")
}

# Course is the top-level entity
type Course @table {
  title: String!
  description: String
  promoVideoVimeoId: String
  price: Float! @default(value: 0.0)
  discountPrice: Float
  visibilityStatus: String! @default(value: "draft") # 'draft', 'coming_soon', 'live'
  
  # Relationships
  instructor: User!
  category: Category!
  
  createdAt: Timestamp! @default(expr: "request.time")
}

# A Course has multiple Modules
type CourseModule @table {
  course: Course!
  title: String!
  orderIndex: Int!
  createdAt: Timestamp! @default(expr: "request.time")
}

# A Module has multiple Lessons
type CourseLesson @table {
  module: CourseModule!
  title: String!
  orderIndex: Int!
  type: String! # 'video', 'article', 'quiz'
  isFree: Boolean! @default(value: false)
  vimeoId: String
  content: String
  createdAt: Timestamp! @default(expr: "request.time")
}
